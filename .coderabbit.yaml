language: "en-US"
early_access: false

tone_instructions: >
  Be concise and direct. Use short bullet points.
  Only surface actionable findings — skip praise, trivial style notes,
  and observations with no clear fix. One sentence per comment max.
  Prefer imperative mood: "Add X", "Remove Y", "Change Z to W".

reviews:
  profile: "assertive"
  request_changes_workflow: true
  high_level_summary: true
  poem: false
  review_status: true
  review_details: false
  collapse_walkthrough: true

  auto_review:
    enabled: true
    drafts: false
    ignore_title_keywords:
      - "WIP"
      - "DO NOT MERGE"
      - "[SKIP REVIEW]"

  path_filters:
    - "!**/*.Designer.cs"
    - "!**/Migrations/**"
    - "!**/migrations/**"
    - "!**/*.generated.cs"
    - "!**/wwwroot/lib/**"
    - "!**/*.min.js"
    - "!**/*.min.css"

  finishing_touches:
    docstrings:
      enabled: true

  pre_merge_checks:
    docstrings:
      mode: "warn"
      threshold: 80

chat:
  auto_reply: true
